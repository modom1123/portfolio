<!DOCTYPE html>

    <!-- Fonts -->

<body>

    <!-- ROW 1: Home + Nav + Back -->
    <div class="row-1">
        <a href="index.html" class="img-block clickable">
            <img src="images/row1-home.png" class="default" alt="Home">
            <img src="images/row1-home-hover.png" class="hover" alt="Home">

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li class="dropdown">
                    <a href="#">EXPERIENCE</a>

                        <li><a href="pages/resume.html">RESUME</a></li>

                </li>
                <li><a href="pages/about-me.html">ABOUT ME</a></li>
            </ul>

        <a href="javascript:history.back()" class="img-block clickable">

            <img src="images/row1-back-hover.png" class="hover" alt="Back">

    <div class="row-3">

        </div>
    </div>

    <!-- ROW 4: Sky -->
    <div class="row-4">
        <div class="img-block" style="height:100%">
            <img src="images/row4-sky.png" class="default" alt="Looking for something specific?">
            <img src="images/row4-sky-hover.png" class="hover" alt="Sky">

    </div>

    <div class="row-5" id="categories">
        <a href="pages/testimonials.html" class="img-block clickable">

        <a href="pages/about-me.html" class="img-block clickable">

    <footer>
        <div class="footer-stripes">
            <div class="stripe s1"></div>
            <div class="stripe s2"></div>
